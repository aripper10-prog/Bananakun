<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun Sync Pro 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        
        /* 青い選択とズームを徹底排除 */
        * { 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            box-sizing: border-box; 
        }

        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden;
        }

        .controls { display: flex; gap: 40px; z-index: 10; }

        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; 
            box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; 
            outline: none; transition: 0.1s;
        }

        /* 押した感の演出 */
        .circle-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--banana-brown);
        }

        .recording { 
            background: #ffeb3b !important; 
            border-color: #ff4444 !important; 
            transform: scale(1.1) !important; 
        }

        .ready-to-play { 
            box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; 
            animation: pulse 1s infinite; 
        }

        @keyframes pulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }

        .message { 
            position: absolute; bottom: 30px; color: var(--banana-brown); 
            font-size: 1.4rem; font-weight: bold; text-align: center; 
            width: 85%; min-height: 3em; line-height: 1.2;
        }

        .char-pop { 
            display: inline-block; 
            animation: pop 0.2s ease-out; 
            color: var(--banana-brown); 
            margin: 0 2px;
        }

        @keyframes pop { 
            0% { transform: scale(0); opacity: 0; } 
            100% { transform: scale(1.3); opacity: 1; } 
        }
    </style>
</head>
<body>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    
    <div id="msg" class="message"></div>

    <script>
        let mediaRecorder, audioChunks = [];
        let bananaScript = "";
        let originalAudioBlob = null;
        let isRecording = false;

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        async function initRecorder() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    originalAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendToGemini(originalAudioBlob);
                };
            } catch (e) {
                msg.innerText = "マイクの使用を許可してください";
            }
        }

        async function sendToGemini(blob) {
            msg.innerText = "🍌...";
            bananaScript = "";
            try {
                const response = await fetch('/api', { method: 'POST', body: blob });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    bananaScript += decoder.decode(value);
                }
                playBtn.classList.add('ready-to-play');
                msg.innerText = "🍌 READY";
            } catch (e) {
                msg.innerText = "ERROR";
            }
        }

        // スマホでの誤動作防止のため pointer イベントを使用
        recBtn.onpointerdown = async (e) => {
            e.preventDefault();
            if (!mediaRecorder) await initRecorder();
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                audioChunks = [];
                isRecording = true;
                mediaRecorder.start();
                recBtn.classList.add('recording');
                msg.innerHTML = "";
            }
        };

        const stopRecording = () => {
            if (isRecording) {
                isRecording = false;
                mediaRecorder.stop();
                recBtn.classList.remove('recording');
            }
        };

        window.onpointerup = stopRecording;
        recBtn.onpointerleave = stopRecording;

        // 同期再生
        playBtn.onclick = async () => {
            if (!bananaScript || !originalAudioBlob) return;
            
            const audioUrl = URL.createObjectURL(originalAudioBlob);
            const audio = new Audio(audioUrl);
            
            // 不要な文字を削って純粋なバナナ文字だけにする
            const chars = bananaScript.replace(/[・ \n\s]/g, "").split("");
            msg.innerHTML = "";
            
            audio.onloadedmetadata = () => {
                const duration = audio.duration;
                const interval = (duration * 1000) / chars.length;

                audio.play();
                audio.volume = 0.3; // 原音は少し控えめ

                chars.forEach((char, i) => {
                    setTimeout(() => {
                        const span = document.createElement("span");
                        span.innerText = char;
                        span.className = "char-pop";
                        msg.appendChild(span);

                        const uttr = new SpeechSynthesisUtterance(char);
                        uttr.lang = 'ja-JP';
                        uttr.pitch = 2.0;
                        uttr.rate = 2.2;
                        window.speechSynthesis.speak(uttr);
                    }, i * interval);
                });
            };
        };
    </script>
</body>
</html>
