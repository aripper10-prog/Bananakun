<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v4.1 🍌</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; user-select: none;
        }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; transition: all 0.1s; touch-action: manipulation;
        }
        .recording { background: #ffeb3b; transform: scale(1.1); border-color: red; }
        .label { font-weight: bold; color: var(--banana-brown); margin-top: 10px; }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div style="display: flex; gap: 40px;">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div class="label">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div class="label">LISTEN</div>
        </div>
    </div>

    <div class="message">タップしてマイクを許可してください</div>

    <script>
        let mic, analyzer, recorder, player, synth, loop;
        let isInitialized = false;

        // マイクとオーディオの初期化
        async function startSystem() {
            try {
                await Tone.start();
                console.log("Audio Context Started");

                mic = new Tone.UserMedia();
                await mic.open(); // ここでポップアップが出るはずです
                
                analyzer = new Tone.Follower(0.1);
                mic.connect(analyzer);

                synth = new Tone.MonoSynth({
                    oscillator: { type: "square8" },
                    envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 0.1 }
                }).toDestination();

                const pitchShift = new Tone.PitchShift(12).toDestination();
                synth.connect(pitchShift);

                recorder = new Tone.Recorder();
                synth.connect(recorder);

                isInitialized = true;
                document.querySelector('.message').innerText = "準備完了。🎤を押しながら話して。";
            } catch (e) {
                console.error("マイクの起動に失敗しました:", e);
                alert("マイクの使用を許可してください。");
            }
        }

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');

        // 録音開始
        recBtn.addEventListener('mousedown', async () => {
            if (!isInitialized) {
                await startSystem();
            }
            if (isInitialized) {
                recBtn.classList.add('recording');
                recorder.start();
                loop = new Tone.Loop(time => {
                    if (analyzer.value > 0.05) {
                        const notes = ["C5", "D5", "E5", "G5"];
                        synth.triggerAttackRelease(notes[Math.floor(Math.random()*4)], "16n", time);
                    }
                }, "8n").start(0);
                Tone.Transport.start();
            }
        });

        // 録音終了
        const stopRec = async () => {
            if (isInitialized && recorder.state === "started") {
                recBtn.classList.remove('recording');
                loop.stop();
                Tone.Transport.stop();
                const blob = await recorder.stop();
                const url = URL.createObjectURL(blob);
                player = new Tone.Player(url).toDestination();
            }
        };

        window.addEventListener('mouseup', stopRec);
        // スマホ用
        recBtn.addEventListener('touchstart', (e) => { e.preventDefault(); recBtn.dispatchEvent(new Event('mousedown')); });
        recBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRec(); });

        playBtn.addEventListener('click', () => {
            if (player) player.start();
        });
    </script>
</body>
</html>
