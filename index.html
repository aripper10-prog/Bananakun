<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun Sync 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden;
        }
        .controls { display: flex; gap: 40px; z-index: 10; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none; transition: 0.1s;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.1); }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 1.2rem; font-weight: bold; text-align: center; width: 85%; min-height: 3em; }
        .char-pop { display: inline-block; animation: pop 0.3s ease-out; color: var(--banana-brown); }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    
    <div id="msg" class="message"></div>

    <script>
        let mediaRecorder, audioChunks = [];
        let bananaScript = "";
        let originalAudioBlob = null;
        let isRecording = false;

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        async function initRecorder() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                originalAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendToGemini(originalAudioBlob);
            };
        }

        async function sendToGemini(blob) {
            msg.innerText = "🍌...";
            bananaScript = "";
            const response = await fetch('/api', { method: 'POST', body: blob });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                bananaScript += decoder.decode(value);
            }
            playBtn.classList.add('ready-to-play');
            msg.innerText = "READY";
        }

        recBtn.onpointerdown = async (e) => {
            e.preventDefault();
            if (!mediaRecorder) await initRecorder();
            audioChunks = [];
            isRecording = true;
            mediaRecorder.start();
            recBtn.classList.add('recording');
        };

        window.onpointerup = () => {
            if (!isRecording) return;
            isRecording = false;
            mediaRecorder.stop();
            recBtn.classList.remove('recording');
        };

        // 同期再生エンジン
        playBtn.onclick = async () => {
            if (!bananaScript || !originalAudioBlob) return;
            
            const audioUrl = URL.createObjectURL(originalAudioBlob);
            const audio = new Audio(audioUrl);
            
            // 文字を配列化（「バナナ」を1文字ずつ分解）
            const chars = bananaScript.replace(/[・ \n]/g, "").split("");
            msg.innerHTML = "";
            
            audio.onloadedmetadata = () => {
                const duration = audio.duration;
                const interval = (duration * 1000) / chars.length; // 1文字あたりの時間を計算

                audio.play();
                audio.volume = 0.4;

                // 原音の進行に合わせて文字を表示＆読み上げ
                chars.forEach((char, i) => {
                    setTimeout(() => {
                        // 視覚的ポップアップ
                        const span = document.createElement("span");
                        span.innerText = char;
                        span.className = "char-pop";
                        msg.appendChild(span);

                        // 個別に読み上げ（短い発音）
                        const uttr = new SpeechSynthesisUtterance(char);
                        uttr.lang = 'ja-JP';
                        uttr.pitch = 2.0;
                        uttr.rate = 2.5; // 超速で一音を出す
                        window.speechSynthesis.speak(uttr);
                    }, i * interval);
                });
            };
        };
    </script>
</body>
</html>
