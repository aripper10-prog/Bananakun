<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v9.0 - Meaning Eraser 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--banana-skin); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 25px 45px; font-size: 1.4rem; font-weight: bold; background: white;
            border: 5px solid var(--banana-brown); border-radius: 50px; color: var(--banana-brown);
            cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
        }
        .controls { display: flex; gap: 40px; z-index: 10; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none; transition: 0.1s;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.05); }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.9rem; text-align: center; width: 85%; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">バナナくんを起動 🍌</button>
    </div>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    <div id="msg" class="message">🎤を長押しして「事実」を話してください</div>

    <script>
        let audioCtx, analyzer, isRecording = false;
        let bananaScript = []; // バナナのタイミングを記録する
        let recordStartTime;

        const startBtn = document.getElementById('start-btn');
        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        startBtn.onclick = async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);
                document.getElementById('overlay').style.display = 'none';
            } catch (e) { alert("マイクを許可してください"); }
        };

        // 音声解析ループ
        function trackVoice() {
            if (!isRecording) return;
            const dataArray = new Uint8Array(analyzer.frequencyBinCount);
            analyzer.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 20) {
                // 声が出ているタイミング（ミリ秒）を記録
                bananaScript.push(Date.now() - recordStartTime);
            }
            requestAnimationFrame(trackVoice);
        }

        recBtn.onpointerdown = (e) => {
            if (e) e.preventDefault();
            if (!audioCtx) return;
            isRecording = true;
            bananaScript = [];
            recordStartTime = Date.now();
            recBtn.classList.add('recording');
            playBtn.classList.remove('ready-to-play');
            trackVoice();
        };

        window.onpointerup = () => {
            if (!isRecording) return;
            isRecording = false;
            recBtn.classList.remove('recording');
            if (bananaScript.length > 0) {
                playBtn.classList.add('ready-to-play');
                msg.innerText = "バナナ化が完了しました。";
            }
        };

        // 再生：記録されたリズムに基づいて、バナナという言葉を合成音声で発話させる
        playBtn.onclick = () => {
            if (bananaScript.length === 0) return;
            msg.innerText = "🍌再生中...🍌";
            
            // 記録されたポイントを「バナナ」という音節の塊に変換
            const chunks = [];
            let currentChunk = [bananaScript[0]];

            for (let i = 1; i < bananaScript.length; i++) {
                if (bananaScript[i] - bananaScript[i-1] < 150) {
                    currentChunk.push(bananaScript[i]);
                } else {
                    chunks.push(currentChunk);
                    currentChunk = [bananaScript[i]];
                }
            }
            chunks.push(currentChunk);

            // 各チャンク（言葉の塊）のタイミングで「バナナ」と喋らせる
            chunks.forEach((chunk, index) => {
                setTimeout(() => {
                    const uttr = new SpeechSynthesisUtterance("バナナ");
                    uttr.lang = 'ja-JP';
                    uttr.pitch = 1.8; // 高いバナナ声
                    uttr.rate = 1.5;  // 早口バナナ
                    window.speechSynthesis.speak(uttr);
                }, chunk[0]);
            });

            setTimeout(() => {
                msg.innerText = "おれはダメだ ➔ バナナバナナ";
            }, bananaScript[bananaScript.length - 1] + 1000);
        };
    </script>
</body>
</html>
