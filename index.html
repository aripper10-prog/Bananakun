<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v5.3 🍌</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        .controls { display: flex; gap: 40px; z-index: 10; }
        .btn-container { position: relative; width: 140px; height: 140px; }
        .gauge-svg { position: absolute; top: -10px; left: -10px; width: 160px; height: 160px; transform: rotate(-90deg); pointer-events: none; }
        .gauge-bg { fill: none; stroke: rgba(0,0,0,0.1); stroke-width: 8; }
        .gauge-bar { fill: none; stroke: var(--banana-brown); stroke-width: 8; stroke-dasharray: 440; stroke-dashoffset: 440; stroke-linecap: round; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none; position: relative; z-index: 5;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .label { font-weight: bold; color: var(--banana-brown); margin-top: 15px; text-align: center; }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.85rem; text-align: center; width: 85%; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="controls">
        <div style="text-align: center;">
            <div class="btn-container">
                <svg class="gauge-svg"><circle class="gauge-bg" cx="80" cy="80" r="70"></circle><circle id="gauge-bar" class="gauge-bar" cx="80" cy="80" r="70"></circle></svg>
                <button id="rec-btn" class="circle-btn">🎤</button>
            </div>
            <div class="label">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <div class="btn-container">
                <button id="play-btn" class="circle-btn">🍌</button>
            </div>
            <div class="label">LISTEN</div>
        </div>
    </div>
    <div id="msg" class="message">🎤を長押しして開始</div>

    <script>
        let mic, analyzer, recorder, synth, loop;
        let audioTag = new Audio(); // Tone.Playerを使わずHTMLタグを使う
        let isInitialized = false;
        let recordStartTime, gaugeInterval;
        const MAX_REC_TIME = 5000;
        
        const msg = document.getElementById('msg');
        const gaugeBar = document.getElementById('gauge-bar');
        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');

        async function init() {
            try {
                await Tone.start();
                mic = new Tone.UserMedia();
                await mic.open();
                analyzer = new Tone.Follower(0.1);
                mic.connect(analyzer);
                
                // バナナシンセ
                synth = new Tone.MonoSynth({
                    oscillator: { type: "square8" },
                    envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 0.1 }
                }).toDestination();
                
                // ピッチシフト（高音）とリバーブ
                const pShift = new Tone.PitchShift(12).toDestination();
                synth.connect(pShift);
                
                recorder = new Tone.Recorder();
                synth.connect(recorder);
                
                isInitialized = true;
                msg.innerText = "準備完了。🎤を押して話して。";
            } catch (e) {
                msg.innerText = "マイクの使用を許可してください";
            }
        }

        const handleStart = async (e) => {
            if (e) e.preventDefault();
            if (!isInitialized) await init();
            if (isInitialized && recorder.state !== "started") {
                recBtn.classList.add('recording');
                playBtn.classList.remove('ready-to-play');
                gaugeBar.style.strokeDashoffset = 440;
                recordStartTime = Date.now();
                
                gaugeInterval = setInterval(() => {
                    const progress = Math.min((Date.now() - recordStartTime) / MAX_REC_TIME, 1);
                    gaugeBar.style.strokeDashoffset = 440 - (progress * 440);
                    if (progress >= 1) handleStop();
                }, 50);
                
                recorder.start();
                loop = new Tone.Loop(t => {
                    if (analyzer.value > 0.03) {
                        synth.triggerAttackRelease(["C5","E5","G5"][Math.floor(Math.random()*3)], "16n", t);
                    }
                }, "8n").start(0);
                Tone.Transport.start();
                msg.innerText = "バナナに上書き中...";
            }
        };

        const handleStop = async (e) => {
            if (e) e.preventDefault();
            if (isInitialized && recorder.state === "started") {
                clearInterval(gaugeInterval);
                recBtn.classList.remove('recording');
                if (loop) loop.stop();
                Tone.Transport.stop();
                
                msg.innerText = "バナナを生成中...";
                try {
                    const blob = await recorder.stop();
                    const url = URL.createObjectURL(blob);
                    
                    // HTML5 Audioタグに流し込む（デコード処理をブラウザに任せる）
                    audioTag.src = url;
                    audioTag.load();
                    
                    playBtn.classList.add('ready-to-play');
                    msg.innerText = "バナナ化完了！🍌をタップ。";
                } catch (err) {
                    msg.innerText = "エラー発生。もう一度試して。";
                }
            }
        };

        const playBanana = (e) => {
            if (e) e.preventDefault();
            if (audioTag.src) {
                audioTag.play().catch(err => {
                    msg.innerText = "再生エラー。もう一度録音して。";
                });
            }
        };

        recBtn.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleStop);
        recBtn.addEventListener('touchstart', handleStart, {passive: false});
        recBtn.addEventListener('touchend', handleStop, {passive: false});
        playBtn.addEventListener('click', playBanana);
        playBtn.addEventListener('touchstart', playBanana, {passive: false});
    </script>
</body>
</html>
