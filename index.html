<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun Sync Final 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; -webkit-user-select: none;
            touch-action: none; box-sizing: border-box; 
        }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden;
        }
        .controls { display: flex; gap: 40px; z-index: 10; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; 
            box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; 
            outline: none; transition: 0.1s;
        }
        .circle-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--banana-brown); }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.1) !important; }
        .ready-to-play { box-shadow: 0 0 50px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .message { 
            position: absolute; bottom: 40px; color: var(--banana-brown); 
            font-size: 1.6rem; font-weight: bold; text-align: center; 
            width: 90%; min-height: 4em; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start;
        }
        .char-pop { display: inline-block; animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--banana-brown); margin: 2px; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    
    <div id="msg" class="message"></div>

    <script>
        let mediaRecorder, audioChunks = [];
        let bananaScript = "";
        let originalAudioBlob = null;
        let isRecording = false;

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        async function initRecorder() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                originalAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendToGemini(originalAudioBlob);
            };
        }

        async function sendToGemini(blob) {
            msg.innerText = "🍌...";
            bananaScript = "";
            const response = await fetch('/api', { method: 'POST', body: blob });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                bananaScript += decoder.decode(value);
            }
            playBtn.classList.add('ready-to-play');
            msg.innerText = "🍌 READY";
        }

        recBtn.onpointerdown = async (e) => {
            e.preventDefault();
            if (!mediaRecorder) await initRecorder();
            audioChunks = [];
            isRecording = true;
            mediaRecorder.start();
            recBtn.classList.add('recording');
            msg.innerHTML = "";
            playBtn.classList.remove('ready-to-play');
        };

        const stopRec = () => { if (isRecording) { isRecording = false; mediaRecorder.stop(); recBtn.classList.remove('recording'); } };
        window.onpointerup = stopRec;
        recBtn.onpointerleave = stopRec;

        playBtn.onclick = async () => {
            if (!bananaScript || !originalAudioBlob) return;
            
            window.speechSynthesis.cancel();
            msg.innerHTML = "";

            const audioUrl = URL.createObjectURL(originalAudioBlob);
            const audio = new Audio(audioUrl);
            
            // 重要：原音を「ガイド」程度に下げる（5%）
            audio.volume = 0.05; 

            // 「バ」「ナ」「ナ」と記号を分ける
            const chars = bananaScript.replace(/[\n\s]/g, "").split("");
            
            audio.onloadedmetadata = () => {
                const totalDuration = audio.duration * 1000;
                // 少しだけ再生開始を遅らせることで、最初の発音との同期を稼ぐ
                const startTime = Date.now();
                audio.play();

                const interval = totalDuration / (chars.length || 1);

                chars.forEach((char, i) => {
                    setTimeout(() => {
                        // 視覚演出
                        const span = document.createElement("span");
                        span.innerText = char;
                        span.className = "char-pop";
                        msg.appendChild(span);

                        // 読み上げ：記号以外のみ発音
                        if(/[バナナ]/.test(char)) {
                            const uttr = new SpeechSynthesisUtterance(char);
                            uttr.lang = 'ja-JP';
                            uttr.pitch = 2.0;
                            uttr.rate = 2.8; // 歯切れよく
                            uttr.volume = 1.0;
                            window.speechSynthesis.speak(uttr);
                        }
                    }, i * interval);
                });
            };
        };
    </script>
</body>
</html>
