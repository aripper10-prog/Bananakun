<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v6.0 - Direct Stream 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--banana-skin); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 30px 50px; font-size: 1.5rem; font-weight: bold;
            background: white; border: 6px solid var(--banana-brown);
            border-radius: 60px; color: var(--banana-brown); cursor: pointer;
            box-shadow: 0 10px 0 var(--banana-brown);
        }
        .controls { display: flex; gap: 40px; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.05); }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.9rem; text-align: center; width: 85%; padding: 10px; background: rgba(255,255,255,0.4); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">バナナを接続する 🍌</button>
    </div>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    <div id="msg" class="message">🎤を長押しして開始</div>

    <script>
        let audioCtx, micStream, analyzer, synthOsc, bananaBuffer = [];
        let isRecording = false;

        const startBtn = document.getElementById('start-btn');
        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        // 1. システム起動（もっとも原始的な方法でマイクを掴む）
        startBtn.onclick = async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micStream = audioCtx.createMediaStreamSource(stream);
                
                // 音量解析用
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                micStream.connect(analyzer);

                // 録音用プロセッサ
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (isRecording) {
                        // 録音中、何らかの音が鳴っていればバッファに貯める
                        const data = e.inputBuffer.getChannelData(0);
                        bananaBuffer.push(...new Float32Array(data));
                    }
                };
                processor.connect(audioCtx.destination);

                document.getElementById('overlay').style.display = 'none';
                msg.innerText = "接続成功。🎤を長押しして話して。";
            } catch (e) {
                alert("マイクへのアクセスが拒否されました。設定を確認してください。");
            }
        };

        // 2. バナナシンセ（録音中に鳴らす音）
        function playBananaNote() {
            if (!audioCtx || !isRecording) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            // 高いピッチでバナナ感を出す
            osc.frequency.setValueAtTime(800 + Math.random() * 1000, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 3. 録音ループ
        function recordingLoop() {
            if (!isRecording) return;
            
            const dataArray = new Uint8Array(analyzer.frequencyBinCount);
            analyzer.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 30) { // 声を検知
                playBananaNote();
            }
            requestAnimationFrame(recordingLoop);
        }

        const handleStart = (e) => {
            if (e) e.preventDefault();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            isRecording = true;
            bananaBuffer = [];
            recBtn.classList.add('recording');
            playBtn.classList.remove('ready-to-play');
            recordingLoop();
        };

        const handleStop = (e) => {
            if (e) e.preventDefault();
            isRecording = false;
            recBtn.classList.remove('recording');
            if (bananaBuffer.length > 0) {
                playBtn.classList.add('ready-to-play');
                msg.innerText = "バナナ化完了。🍌をタップ。";
            }
        };

        // 4. 再生
        playBtn.onclick = () => {
            if (bananaBuffer.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const buffer = audioCtx.createBuffer(1, bananaBuffer.length, audioCtx.sampleRate);
            buffer.copyToChannel(new Float32Array(bananaBuffer), 0);
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        };

        recBtn.addEventListener('pointerdown', handleStart);
        window.addEventListener('pointerup', handleStop);
    </script>
</body>
</html>
