<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun AI - Hybrid Voice 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        .controls { display: flex; gap: 40px; z-index: 10; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none; transition: 0.1s;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.1); }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.9rem; text-align: center; width: 85%; background: rgba(255,255,255,0.4); padding: 15px; border-radius: 12px; min-height: 4em; line-height: 1.4; word-break: break-all; }
    </style>
</head>
<body>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    
    <div id="msg" class="message">🎤を長押しして真実を話してください</div>

    <script>
        let mediaRecorder, audioChunks = [];
        let bananaScript = "";
        let originalAudioBlob = null;
        let isRecording = false;

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        async function initRecorder() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    originalAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await startStreamingTransform(originalAudioBlob);
                };
            } catch (e) {
                msg.innerText = "マイクの使用を許可してください";
            }
        }

        async function startStreamingTransform(blob) {
            msg.innerText = "意味を剥奪中...";
            bananaScript = "";
            playBtn.classList.remove('ready-to-play');

            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    body: blob
                });

                if (!response.ok) throw new Error("Server Error");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    bananaScript += text;
                    msg.innerText = "🍌: " + bananaScript;
                }

                playBtn.classList.add('ready-to-play');
                msg.innerText = "バナナ化完了：\n" + bananaScript;

            } catch (err) {
                msg.innerText = "エラーが発生しました。";
            }
        }

        recBtn.onpointerdown = async (e) => {
            e.preventDefault();
            if (!mediaRecorder) await initRecorder();
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                audioChunks = [];
                isRecording = true;
                mediaRecorder.start();
                recBtn.classList.add('recording');
                msg.innerText = "真実を録音中...";
            }
        };

        const stopRecording = () => {
            if (isRecording && mediaRecorder.state === 'recording') {
                isRecording = false;
                mediaRecorder.stop();
                recBtn.classList.remove('recording');
            }
        };

        window.onpointerup = stopRecording;

        // ハイブリッド再生処理
        playBtn.onclick = async () => {
            if (!bananaScript || !originalAudioBlob) return;
            
            window.speechSynthesis.cancel();

            // 1. 元の声を再生（ピッチを上げて「バナナ感」を出す）
            const audioUrl = URL.createObjectURL(originalAudioBlob);
            const audio = new Audio(audioUrl);
            audio.playbackRate = 1.1; // 少し速く
            audio.volume = 0.3;      // 背景として薄く流す
            audio.play();

            // 2. Geminiのバナナ語を合成音声で被せる
            const uttr = new SpeechSynthesisUtterance(bananaScript);
            uttr.lang = 'ja-JP';
            uttr.pitch = 1.8;
            uttr.rate = 1.1;
            window.speechSynthesis.speak(uttr);

            msg.innerText = "🍌 再生中... 🍌";
        };
    </script>
</body>
</html>
