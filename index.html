<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>思考言語無効化ツール ばなな君</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; --accent-blue: #58a6ff; }
        
        * { 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box; 
        }

        /* リンクとテキスト表示エリアは選択・操作を許可 */
        a, .support-section, #trans-text, #banana-display {
            -webkit-touch-callout: default;
            -webkit-user-select: auto;
            user-select: auto;
            touch-action: manipulation;
        }

        body {
            margin: 0; padding: 15px; display: flex; flex-direction: column; 
            min-height: 100dvh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; color: var(--banana-brown);
            /* スクロールを許可する設定に変更 */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .container {
            width: 100%; max-width: 450px; margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100%; /* 中身に応じて伸びるように */
        }

        .title-area {
            border-bottom: 1px solid rgba(111, 78, 55, 0.2);
            margin-bottom: 20px; padding: 20px 0 10px 0; text-align: center; width: 100%;
        }
        .sub-title { font-size: 11px; font-weight: bold; letter-spacing: 1.5px; opacity: 0.8; }
        .main-title { font-size: 28px; font-weight: bold; margin-top: 5px; }

        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; gap: 40px; 
            padding: 20px 0; /* 上下の余白を確保 */
        }

        .controls { display: flex; gap: 40px; z-index: 10; }

        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; 
            box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; 
            outline: none; transition: 0.1s;
            /* ボタン上でのスクロール暴発を防ぐ */
            touch-action: none; 
        }
        .circle-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--banana-brown); }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.1); }
        .ready-to-play { box-shadow: 0 0 50px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 0.8s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .message-area { text-align: center; width: 100%; min-height: 120px; }
        .transcription { font-size: 14px; opacity: 0.6; font-style: italic; margin-bottom: 10px; min-height: 1.2em; }
        .banana-display { font-size: 28px; font-weight: bold; line-height: 1.3; word-break: break-all; }

        .support-section { margin-top: 20px; text-align: center; width: 100%; z-index: 50; }
        .support-toggle-btn {
            background: none; border: 1px solid rgba(111, 78, 55, 0.3);
            color: var(--banana-brown); padding: 8px 16px; border-radius: 20px;
            font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .support-box {
            background: white; border: 1px solid rgba(111, 78, 55, 0.2);
            border-radius: 12px; padding: 20px; margin-top: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none;
        }
        .qr-wrapper { background: white; padding: 5px; width: 140px; margin: 0 auto 15px auto; border: 1px solid #eee; }
        .qr-wrapper img { width: 100%; display: block; }
        .app-launch-btn {
            display: block; background: #ff0033; color: white; text-decoration: none;
            padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px;
        }

        .footer-links { margin-top: 40px; padding: 20px 0; text-align: center; width: 100%; }
        .footer-links a { 
            color: var(--banana-brown); font-size: 12px; text-decoration: underline; 
            display: inline-block; margin: 5px 10px;
        }
        .copyright { font-size: 11px; opacity: 0.7; margin-top: 10px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-area">
            <div class="sub-title">思考言語無効化ツール</div>
            <div class="main-title">ばなな君</div>
        </div>

        <div class="main-content">
            <div class="controls">
                <div style="text-align: center;">
                    <button id="rec-btn" class="circle-btn">🎤</button>
                    <div style="font-weight:bold; margin-top:15px;">録音</div>
                </div>
                <div style="text-align: center;">
                    <button id="play-btn" class="circle-btn">🍌</button>
                    <div style="font-weight:bold; margin-top:15px;">バナナ化</div>
                </div>
            </div>

            <div class="message-area">
                <div id="trans-text" class="transcription">🎤 ボタンを長押しして話してください</div>
                <div id="banana-display" class="banana-display"></div>
            </div>

            <div class="support-section">
                <button id="support-toggle-btn" class="support-toggle-btn">📣 開発を応援する</button>
                <div id="support-box" class="support-box">
                    <p style="font-size: 13px; margin-bottom: 15px;">維持・運営を応援いただけると嬉しいです。</p>
                    <a href="https://qr.paypay.ne.jp/p2p01_TXcNu8RqltIo8qI4" target="_blank" rel="noopener noreferrer">
                        <div class="qr-wrapper"><img src="/support-qr.png" alt="QR"></div>
                    </a>
                    <a href="https://qr.paypay.ne.jp/p2p01_TXcNu8RqltIo8qI4" target="_blank" rel="noopener noreferrer" class="app-launch-btn">PayPay起動</a>
                </div>
            </div>
        </div>

        <div class="footer-links">
            <a href="https://x.com/Suterukun2026" target="_blank" rel="noopener noreferrer">X公式アカウント</a>
            <a href="https://suterukun.vercel.app/" target="_blank" rel="noopener noreferrer">雑念除去支援システム すてる君</a>
            <div class="copyright">&copy; <span id="year"></span> Suteru-kun Project</div>
        </div>
    </div>

    <script>
        let mediaRecorder, audioChunks = [];
        let bananaScript = "";
        let originalAudioBlob = null;
        let isRecording = false;

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const transDisplay = document.getElementById('trans-text');
        const bananaDisplay = document.getElementById('banana-display');
        const supportBox = document.getElementById('support-box');
        const supportToggleBtn = document.getElementById('support-toggle-btn');

        document.getElementById('year').innerText = new Date().getFullYear();

        supportToggleBtn.onclick = () => {
            const isHidden = supportBox.style.display === 'none' || !supportBox.style.display;
            supportBox.style.display = isHidden ? 'block' : 'none';
            supportToggleBtn.innerText = isHidden ? "× 閉じる" : "📣 開発を応援する";
        };

        async function initRecorder() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    originalAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processBananakun(originalAudioBlob);
                };
            } catch (e) {
                transDisplay.innerText = "マイクの使用を許可してください";
            }
        }

        async function processBananakun(blob) {
            transDisplay.innerText = "無効化中...";
            bananaScript = "";
            try {
                const response = await fetch('/api', { method: 'POST', body: blob });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let raw = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    raw += decoder.decode(value);
                }
                const parts = raw.split('|');
                transDisplay.innerText = parts[0] ? parts[0].replace("原文:", "").trim() : "";
                bananaScript = parts[1] ? parts[1].trim() : raw;
                bananaDisplay.innerText = "🍌 READY";
                playBtn.classList.add('ready-to-play');
            } catch (e) {
                transDisplay.innerText = "解析エラー";
            }
        }

        recBtn.onpointerdown = async (e) => {
            e.preventDefault();
            if (!mediaRecorder) await initRecorder();
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                audioChunks = [];
                isRecording = true;
                mediaRecorder.start();
                recBtn.classList.add('recording');
                bananaDisplay.innerText = "";
                playBtn.classList.remove('ready-to-play');
            }
        };

        const stopRec = () => { if (isRecording) { isRecording = false; mediaRecorder.stop(); recBtn.classList.remove('recording'); } };
        window.onpointerup = stopRec;
        recBtn.onpointerleave = stopRec;

        playBtn.onclick = () => {
            if (!bananaScript || !originalAudioBlob) return;
            window.speechSynthesis.cancel();
            
            const audio = new Audio(URL.createObjectURL(originalAudioBlob));
            audio.onloadedmetadata = () => {
                const duration = audio.duration;
                const uttr = new SpeechSynthesisUtterance(bananaScript);
                uttr.lang = 'ja-JP';
                uttr.pitch = 1.4;
                const rate = (bananaScript.length * 0.2) / duration;
                uttr.rate = Math.max(0.6, Math.min(2.5, rate)); 
                bananaDisplay.innerText = bananaScript;
                window.speechSynthesis.speak(uttr);
            };
        };
    </script>
</body>
</html>
