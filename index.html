<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v4.3 🍌</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        
        * {
            /* 範囲選択と長押しメニューを完全に無効化 */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none; /* ブラウザのスクロールやズームを防止 */
        }

        .controls { display: flex; gap: 40px; }
        
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer;
            box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center;
            outline: none;
            transition: transform 0.1s;
            touch-action: none; /* ボタン上でのジェスチャーを無効化 */
        }
        
        .recording { background: #ffeb3b !important; transform: scale(1.1) !important; border-color: #ff4444 !important; }
        .ready-to-play { box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 8px 0 var(--banana-brown); }
        .circle-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--banana-brown); }
        
        .label { font-weight: bold; color: var(--banana-brown); margin-top: 10px; text-align: center; }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.8rem; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div class="label">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div class="label">LISTEN</div>
        </div>
    </div>

    <div id="msg" class="message">🎤ボタンを長押しして話してください</div>

    <script>
        let mic, analyzer, recorder, player, synth, loop;
        let isInitialized = false;
        const msg = document.getElementById('msg');

        async function startSystem() {
            try {
                await Tone.start();
                mic = new Tone.UserMedia();
                await mic.open();
                analyzer = new Tone.Follower(0.1);
                mic.connect(analyzer);
                synth = new Tone.MonoSynth({
                    oscillator: { type: "square8" },
                    envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 0.1 }
                }).toDestination();
                const pitchShift = new Tone.PitchShift(12).toDestination();
                synth.connect(pitchShift);
                recorder = new Tone.Recorder();
                synth.connect(recorder);
                isInitialized = true;
                msg.innerText = "準備完了。🎤を押しながら話して。";
            } catch (e) {
                alert("マイク設定を確認してください");
            }
        }

        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');

        const handleStart = async (e) => {
            e.preventDefault();
            if (!isInitialized) await startSystem();
            if (isInitialized) {
                recBtn.classList.add('recording');
                playBtn.classList.remove('ready-to-play');
                recorder.start();
                loop = new Tone.Loop(time => {
                    if (analyzer.value > 0.05) {
                        const notes = ["C5", "D5", "E5", "G5"];
                        synth.triggerAttackRelease(notes[Math.floor(Math.random()*4)], "16n", time);
                    }
                }, "8n").start(0);
                Tone.Transport.start();
            }
        };

        const handleStop = async (e) => {
            e.preventDefault();
            if (isInitialized && recorder.state === "started") {
                recBtn.classList.remove('recording');
                if (loop) loop.stop();
                Tone.Transport.stop();
                const blob = await recorder.stop();
                const url = URL.createObjectURL(blob);
                if (player) player.dispose();
                player = new Tone.Player(url).toDestination();
                player.buffer.onload = () => {
                    playBtn.classList.add('ready-to-play');
                    msg.innerText = "バナナに変換されました。🍌を押して。";
                };
            }
        };

        // イベント登録（マウスとタッチの両方に対応）
        recBtn.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleStop);
        recBtn.addEventListener('touchstart', handleStart, {passive: false});
        recBtn.addEventListener('touchend', handleStop, {passive: false});

        // 再生ボタンの処理（クリック/タップ）
        const handlePlay = async (e) => {
            e.preventDefault();
            if (player && player.loaded) {
                await Tone.start();
                player.start();
            }
        };

        playBtn.addEventListener('click', handlePlay);
        playBtn.addEventListener('touchstart', handlePlay, {passive: false});

    </script>
</body>
</html>
