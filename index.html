<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🍌 Bananakun v6.1 - Final Sync 🍌</title>
    <style>
        :root { --banana-skin: #fadb14; --banana-brown: #6f4e37; }
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body {
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background: radial-gradient(circle, #fffbe6 0%, #fadb14 100%);
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--banana-skin); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 30px 50px; font-size: 1.5rem; font-weight: bold; background: white;
            border: 6px solid var(--banana-brown); border-radius: 60px; color: var(--banana-brown);
            cursor: pointer; box-shadow: 0 10px 0 var(--banana-brown);
        }
        .controls { display: flex; gap: 40px; }
        .circle-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--banana-brown);
            background: white; font-size: 5rem; cursor: pointer; box-shadow: 0 8px 0 var(--banana-brown);
            display: flex; justify-content: center; align-items: center; outline: none;
        }
        .recording { background: #ffeb3b !important; border-color: #ff4444 !important; transform: scale(1.05); }
        .ready-to-play { box-shadow: 0 0 40px #fff, 0 8px 0 var(--banana-brown) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .message { position: absolute; bottom: 30px; color: var(--banana-brown); font-size: 0.9rem; text-align: center; width: 85%; padding: 10px; background: rgba(255,255,255,0.4); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">バナナを起動する 🍌</button>
    </div>

    <div class="controls">
        <div style="text-align: center;">
            <button id="rec-btn" class="circle-btn">🎤</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">TRANSFORM</div>
        </div>
        <div style="text-align: center;">
            <button id="play-btn" class="circle-btn">🍌</button>
            <div style="font-weight:bold; color:var(--banana-brown); margin-top:15px;">LISTEN</div>
        </div>
    </div>
    <div id="msg" class="message">🎤を長押しして録音</div>

    <script>
        let audioCtx, analyzer, processor, bananaBuffer = [];
        let isRecording = false;

        const startBtn = document.getElementById('start-btn');
        const recBtn = document.getElementById('rec-btn');
        const playBtn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');

        // 1. 起動処理
        startBtn.onclick = async () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);

                // 録音用プロセッサ（ここで音をキャッチして配列に入れる）
                processor = audioCtx.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (isRecording) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        // 声の波形をそのままバッファに保存
                        bananaBuffer.push(...new Float32Array(inputData));
                        
                        // 録音中に声を検知したら「バナナの音」を鳴らす（モニター用）
                        checkVolumeAndBeep();
                    }
                };
                source.connect(processor);
                processor.connect(audioCtx.destination);

                document.getElementById('overlay').style.display = 'none';
            } catch (e) {
                alert("マイク接続に失敗しました。");
            }
        };

        // 録音中のピコピコ音
        function checkVolumeAndBeep() {
            const dataArray = new Uint8Array(analyzer.frequencyBinCount);
            analyzer.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 25) { // 感度を少し上げました
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(1000 + Math.random() * 500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        const handleStart = (e) => {
            if (e) e.preventDefault();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            isRecording = true;
            bananaBuffer = []; // 録音のたびにリセット
            recBtn.classList.add('recording');
            playBtn.classList.remove('ready-to-play');
            msg.innerText = "バナナ化中...（話してください）";
        };

        const handleStop = (e) => {
            if (e) e.preventDefault();
            if (!isRecording) return;
            isRecording = false;
            recBtn.classList.remove('recording');
            
            if (bananaBuffer.length > 0) {
                playBtn.classList.add('ready-to-play');
                msg.innerText = "バナナ化完了！🍌をタップして再生";
            } else {
                msg.innerText = "声が録音されませんでした。";
            }
        };

        // 2. 再生処理（ここに全力を注ぎました）
        const playBanana = async (e) => {
            if (e) e.preventDefault();
            if (bananaBuffer.length === 0) return;
            
            // 再生前にコンテキストを再開（重要）
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // 録音したデータをバナナ風に加工して再生
            const buffer = audioCtx.createBuffer(1, bananaBuffer.length, audioCtx.sampleRate);
            const channelData = buffer.getChannelData(0);
            
            for (let i = 0; i < bananaBuffer.length; i++) {
                // 少しだけ音をザラつかせてバナナ感を出す
                channelData[i] = bananaBuffer[i] * (Math.random() > 0.98 ? 0.5 : 1.2);
            }
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            
            // 再生速度を少し上げて「バナナっぽい高い声」にする
            source.playbackRate.value = 1.2; 
            
            source.connect(audioCtx.destination);
            source.start(0);
            msg.innerText = "バナナ語再生中...🍌";
            
            source.onended = () => {
                msg.innerText = "もう一度聴く？ 🍌をタップ。";
            };
        };

        recBtn.addEventListener('pointerdown', handleStart);
        window.addEventListener('pointerup', handleStop);
        playBtn.addEventListener('pointerdown', playBanana);
    </script>
</body>
</html>
